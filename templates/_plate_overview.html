            function renderTemplatePreviewPlate(groupsDict) {
                if (!poTemplatePreviewPlate) return;
                const wellToGroup = {};
                Object.entries(groupsDict || {}).forEach(([gname, ws], idx) => {
                    (Array.isArray(ws) ? ws : []).forEach(well => {
                        if (data.all_wells.includes(well)) {
                            wellToGroup[well] = { name: gname, idx };
                        }
                    });
                });

                let previewHtml = '<div class="po-template-preview-shell"><table class="po-template-preview-table">';
                previewHtml += '<thead><tr><th class="po-template-preview-row"></th>';
                for (let c = 0; c < COLS; c++) {
                    previewHtml += `<th>${String(c + 1).padStart(2, "0")}</th>`;
                }
                previewHtml += "</tr></thead><tbody>";
                for (let r = 0; r < ROWS.length; r++) {
                    previewHtml += `<tr><th class="po-template-preview-row">${ROWS[r]}</th>`;
                    for (let c = 0; c < COLS; c++) {
                        const well = ROWS[r] + String(c + 1).padStart(2, "0");
                        const grp = wellToGroup[well] || null;
                        const hasData = data.all_wells.includes(well);
                        const cellBg = grp ? poGroupColor(grp.idx) : (hasData ? "#ffffff" : "#f8fafc");
                        const cellClasses = `po-template-preview-cell${hasData ? "" : " po-template-no-data"}`;
                        const groupText = grp ? escapeHtml(grp.name) : "";
                        const wellText = hasData ? `<span class="po-template-preview-well">${well}</span>` : "";
                        previewHtml += `<td class="${cellClasses}" style="background:${cellBg};">${groupText}${wellText}</td>`;
                    }
                    previewHtml += "</tr>";
                }
                previewHtml += "</tbody></table></div>";
                poTemplatePreviewPlate.innerHTML = previewHtml;
                if (poTemplatePopover) poTemplatePopover.classList.add("visible");
            }

            const poTemplatePreviewBtn = document.getElementById("po-template-preview");
            if (poTemplatePreviewBtn) {
                poTemplatePreviewBtn.addEventListener("mouseenter", function() {
                    const tid = String(poTemplateSelect?.value || "");
                    if (!tid) return;
                    const templates = loadTemplatesFromStorage();
                    const tpl = templates.find(t => String(t.id) === tid);
                    if (!tpl) return;
                    const groupsDict = poTemplateToGroups(tpl);
                    if (!Object.keys(groupsDict).length) return;

                    // Position the popover directly under the button
                    const rect = poTemplatePreviewBtn.getBoundingClientRect();
                    // We need to account for the modal's scroll position or absolute positioning
                    // Since the popover is inside the modal (relative to po-content or similar), 
                    // we use offsetTop/Left if possible, or just fixed if the modal is fixed.
                    // Actually po-template-popover is absolute. Let's use the button's position.
                    poTemplatePopover.style.left = `${poTemplatePreviewBtn.offsetLeft}px`;
                    poTemplatePopover.style.top = `${poTemplatePreviewBtn.offsetTop + poTemplatePreviewBtn.offsetHeight}px`;

                    renderTemplatePreviewPlate(groupsDict);
                });
                poTemplatePreviewBtn.addEventListener("mouseleave", function() {
                    hideTemplatePreview();
                });
            }


            function refreshPoTemplateSelect() {
                if (!poTemplateSelect) return;
                const templates = loadTemplatesFromStorage();
                poTemplateSelect.innerHTML = '<option value="">Select template</option>';
                templates.forEach(t => {
                    const opt = document.createElement("option");
                    opt.value = String(t.id);
                    opt.textContent = `${t.name} (${(t.groups || []).length} groups)`;
                    poTemplateSelect.appendChild(opt);
                });
            }
            refreshPoTemplateSelect();

            poTemplateToolsToggle?.addEventListener("click", function() {
                const isOpen = poTemplateToolsWrap && poTemplateToolsWrap.style.display !== "none";
                setTemplateToolsOpen(!isOpen);
            });

            document.getElementById("po-template-save")?.addEventListener("click", function() {
                const name = (poTemplateNameInput?.value || "").trim();
                if (!name) {
                    window.alert("Enter a template name first.");
                    return;
                }
                const groupsDict = Object.fromEntries(
                    Object.entries(poGroups || {}).map(([g, ws]) => [g, Array.isArray(ws) ? ws.slice() : []])
                );
                const ok = saveGroupsDictAsTemplate(name, groupsDict);
                if (ok) {
                    if (poTemplateStatus) poTemplateStatus.textContent = `Saved template '${name}'.`;
                    if (poTemplateNameInput) poTemplateNameInput.value = "";
                    refreshPoTemplateSelect();
                }
            });

            document.getElementById("po-template-apply")?.addEventListener("click", function() {
                const tid = String(poTemplateSelect?.value || "");
                if (!tid) return;
                const templates = loadTemplatesFromStorage();
                const tpl = templates.find(t => String(t.id) === tid);
                if (!tpl) return;
                const groupsDict = poTemplateToGroups(tpl);
                if (!Object.keys(groupsDict).length) {
                    window.alert("Template has no wells matching the current plate.");
                    return;
                }
                poGroups = groupsDict;
                poRenderGroupLegend(); updateGroupLabels();
                reRenderAllCells();
                if (poTemplateStatus) poTemplateStatus.textContent = "Template applied.";
                hideTemplatePreview();
                saveCurrentTabState();
                poSaveGroups();
            });
            poTemplateSelect?.addEventListener("change", function() {
                hideTemplatePreview();
                if (poTemplateStatus) poTemplateStatus.textContent = "";
            });

            document.getElementById("po-template-delete")?.addEventListener("click", function() {
                const tid = String(poTemplateSelect?.value || "");
                if (!tid) { if (poTemplateStatus) poTemplateStatus.textContent = "Select a template first."; return; }
                const templates = loadTemplatesFromStorage();
                const tpl = templates.find(t => String(t.id) === tid);
                if (!tpl) return;
                if (!window.confirm(`Delete template '${tpl.name}'?`)) return;
                const updated = templates.filter(t => String(t.id) !== tid);
                localStorage.setItem("po_group_templates", JSON.stringify(updated));
                if (poTemplateStatus) poTemplateStatus.textContent = `Deleted template '${tpl.name}'.`;
                refreshPoTemplateSelect();
                hideTemplatePreview();
            });

            // Render group legend
            poRenderGroupLegend();

            // Group color swatch — shows pending group color
            function updateGroupColorSwatch() {
                if (groupColorSwatch) groupColorSwatch.style.background = poGetPendingGroupColor();
            }
            updateGroupColorSwatch();
            const groupNameInput = document.getElementById("po-group-name-input");
            if (groupNameInput) {
                groupNameInput.addEventListener("input", updateGroupColorSwatch);
            }

            // Grouping mode toggle
            if (drawModeBtn) {
                drawModeBtn.addEventListener("click", function() {
                    poDrawMode = !poDrawMode;
                    drawModeBtn.textContent = poDrawMode ? "Grouping mode: ON" : "Grouping mode: OFF";
                    drawModeBtn.style.background = poDrawMode ? "#16a34a" : "#475569";
                    if (poDrawMode) {
                        setPoActionMode("");
                    }
                    poRenderGroupLegend(); // Update halving banner and legend
                });
            }

            // Cell interaction
            const table = document.getElementById("po-grid-table");
            if (table) {
                table.addEventListener("mousedown", function(evt) {
                    const cell = evt.target.closest(".po-cell[data-well]");
                    if (!cell) return;
                    const well = cell.dataset.well;
                    if (!data.all_wells.includes(well)) return;
                    if (poDrawMode) {
                        poDragging = true;
                        const assignedGroup = poGetGroupForWell(well);
                        if (assignedGroup !== null) {
                            // Remove from its group
                            poGroups[assignedGroup] = poGroups[assignedGroup].filter(w => w !== well);
                            if (!poGroups[assignedGroup].length) delete poGroups[assignedGroup];
                            poSelection.delete(well);
                            poUpdateCellVisual(cell, well, normalizedCb, null, globalYRange);
                            updateGroupLabels();
                        } else if (poSelection.has(well)) {
                            poSelection.delete(well);
                            poUpdateCellVisual(cell, well, normalizedCb, null, globalYRange);
                        } else {
                            poSelection.add(well);
                            poUpdateCellVisual(cell, well, normalizedCb, null, globalYRange);
                            cell.style.background = poGetPendingGroupColor();
                        }
                        evt.preventDefault();
                    }
                });
                table.addEventListener("mouseover", function(evt) {
                    if (!poDrawMode || !poDragging) return;
                    const cell = evt.target.closest(".po-cell[data-well]");
                    if (!cell) return;
                    const well = cell.dataset.well;
                    if (!data.all_wells.includes(well)) return;
                    poSelection.add(well);
                    poUpdateCellVisual(cell, well, normalizedCb, null, globalYRange);
                    if (poGetGroupForWell(well) === null) cell.style.background = poGetPendingGroupColor();
                });
                document.addEventListener("mouseup", function() {
                    if (poDragging && poDrawMode) poSaveGroups();
                    poDragging = false;
                });
                table.addEventListener("click", function(evt) {
                    if (poDrawMode) return;
                    const cell = evt.target.closest(".po-cell[data-well]");
                    if (!cell) return;
                    const well = cell.dataset.well;
                    if (!data.all_wells.includes(well)) return;
                    // GvC wizard intercepts clicks in steps 1 & 2
                    if (poGvcStep === 1) {
                        if (poGvcControlWells.has(well)) poGvcControlWells.delete(well);
                        else poGvcControlWells.add(well);
                        poGvcUpdateCellVisuals();
                        const ct = document.getElementById("po-gvc-ctrl-count");
                        if (ct) ct.textContent = `${poGvcControlWells.size} control well${poGvcControlWells.size!==1?"s":""} selected`;
                        if (poGvcShowInfo) poGvcRefreshSummary();
                        return;
                    }
                    if (poGvcStep === 2) {
                        if (poGvcExcludeMode) {
                            if (poGvcExcludedWells.has(well)) poGvcExcludedWells.delete(well);
                            else poGvcExcludedWells.add(well);
                            poGvcUpdateCellVisuals();
                            if (poGvcShowInfo) poGvcRefreshSummary();
                            return;
                        }
                        const grpName = poGetGroupForWell(well);
                        if (!grpName) return;
                        const idx = poGvcSelectedGroups.indexOf(grpName);
                        if (idx >= 0) poGvcSelectedGroups.splice(idx, 1);
                        else poGvcSelectedGroups.push(grpName);
                        poGvcUpdateCellVisuals();
                        const ct = document.getElementById("po-gvc-grp-count");
                        if (ct) ct.textContent = `${poGvcSelectedGroups.length} group${poGvcSelectedGroups.length!==1?"s":""} selected`;
                        if (poGvcShowInfo) poGvcRefreshSummary();
                        return;
                    }
                    if (poGvcStep === 3) return;
                    // GvG wizard intercepts clicks in step 1
                    if (poGvgStep === 1) {
                        const grpName = poGetGroupForWell(well);
                        if (!grpName) return;
                        const currentPlot = poGvgPlots[poGvgCurrentIdx];
                        if (!currentPlot) return;
                        const idx = currentPlot.groups.findIndex(g => g.original === grpName);
                        if (idx >= 0) {
                            currentPlot.groups.splice(idx, 1);
                        } else {
                            currentPlot.groups.push({ original: grpName, plot_name: grpName });
                        }
                        poGvgUpdateCellVisuals();
                        poGvgRenderWizard(); // Re-render to update the 2-column table
                        return;
                    }
                    if (poGvgStep === 2) return;
                    if (poActionMode) {
                        if (poSelection.has(well)) {
                            poSelection.delete(well);
                        } else {
                            poSelection.add(well);
                        }
                        poUpdateCellVisual(cell, well, normalizedCb, null, globalYRange);
                        refreshPoInfo();
                        return;
                    }
                    openWellDetailedPlot(well);
                });
            }

            // Assign button
            function poSaveGroups() {
                saveCurrentTabState();
                fetch("/plate_overview/update_groups", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: `plate_session_id=${encodeURIComponent(data.plate_session_id)}&groups_json=${encodeURIComponent(JSON.stringify(poGroups))}`,
                }).catch(() => {});
            }

            const assignBtn = document.getElementById("po-assign-btn");
            if (assignBtn) {
                assignBtn.addEventListener("click", function() {
                    const gname = poActiveFeature !== ""
                        ? getConstValueLabel()
                        : (groupNameInput?.value || "").trim();
                    if (!gname) {
                        window.alert(poActiveFeature !== "" ? "Enter a value." : "Enter a group name.");
                        return;
                    }
                    if (!poSelection.size) { window.alert("Select wells first."); return; }
                    if (!poGroups[gname]) poGroups[gname] = [];
                    poSelection.forEach(w => {
                        if (!poGroups[gname].includes(w)) poGroups[gname].push(w);
                    });
                    poGroups[gname].sort();
                    poSelection.clear();
                    reRenderAllCells();
                    poRenderGroupLegend(); updateGroupLabels();
                    updateGroupColorSwatch();
                    poSaveGroups();
                });
            }

            // Clear selection
            const clearSelBtn = document.getElementById("po-clear-sel-btn");
            if (clearSelBtn) {
                clearSelBtn.addEventListener("click", function() {
                    poSelection.clear();
                    reRenderAllCells();
                    refreshPoInfo();
                });
            }

            // Clear groups
            const clearGroupsBtn = document.getElementById("po-clear-groups-btn");
            if (clearGroupsBtn) {
                clearGroupsBtn.addEventListener("click", function() {
                    if (!window.confirm("Clear all groups?")) return;
                    poGroups = {};
                    reRenderAllCells();
                    poRenderGroupLegend(); updateGroupLabels();
                    updateGroupColorSwatch();
                    poSaveGroups();
                });
            }

            // Action buttons
            function poPostForm(action, fields, targetBlank=true) {
                const form = document.createElement("form");
                form.method = "POST";
                form.action = action;
                if (targetBlank) form.target = "_blank";
                Object.entries(fields).forEach(([k, v]) => {
                    if (Array.isArray(v)) {
                        v.forEach((item) => {
                            const inp = document.createElement("input");
                            inp.type = "hidden";
                            inp.name = k;
                            inp.value = item;
                            form.appendChild(inp);
                        });
                    } else {
                        const inp = document.createElement("input");
                        inp.type = "hidden";
                        inp.name = k;
                        inp.value = v;
                        form.appendChild(inp);
                    }
                });
                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);
            }

            function poGetSelectedOrGroupedWells() {
                if (poSelection.size) return Array.from(poSelection).sort();
                const grouped = new Set();
                Object.values(poGroups).forEach(ws => (ws || []).forEach(w => grouped.add(w)));
                return grouped.size ? Array.from(grouped).sort() : data.all_wells.slice().sort();
            }

            function groupsFilteredBySelection(groupsDict, selectedWells) {
                if (!selectedWells || !selectedWells.length) return groupsDict;
                const sel = new Set(selectedWells);
                const out = {};
                Object.entries(groupsDict || {}).forEach(([g, ws]) => {
                    const keep = (Array.isArray(ws) ? ws : []).filter(w => sel.has(w));
                    if (keep.length) out[g] = keep;
                });
                return out;
            }

            function armAction(actionKey) {
                if (poDrawMode) {
                    window.alert("Turn off grouping mode first.");
                    return;
                }
                if (poActionMode === actionKey) {
                    // Toggle off
                    setPoActionMode("");
                    poSelection.clear();
                    reRenderAllCells();
                    return;
                }
                poSelection.clear();
                reRenderAllCells();
                setPoActionMode(actionKey);
            }

            function runPlotAgg() {
                const wells = poGetSelectedOrGroupedWells();
                if (!wells.length) { window.alert("Select at least one well."); return; }
                const norm = poOptsNorm ? (poOptsNorm.checked ? "1" : "0") : "0";
                const xFrom = poOptsXFrom?.value.trim() || "";
                const xTo   = poOptsXTo?.value.trim() || "";
                const fields = {
                    dataset_id: data.plate_session_id,
                    groups_json: JSON.stringify(poGroups),
                    wells: wells,
                    normalized_curve: norm,
                    custom_plot_title: poOptsPlotTitle?.value.trim() || "",
                    custom_x_label:    poOptsXTitle?.value.trim() || "",
                    custom_y_label:    poOptsYTitle?.value.trim() || "",
                };
                if (xFrom !== "") fields.x_from = xFrom;
                if (xTo   !== "") fields.x_to   = xTo;
                poPostForm("/plot/render", fields);
                setPoActionMode("");
                poOptsPanel?.classList.remove("visible");
            }

            // Wire FAB button
            if (poFabBtn) {
                poFabBtn.addEventListener("click", function() {
                    if (!poOptsPanel) return;
                    poOptsPanel.classList.toggle("visible");
                });
            }
            if (poOptsGenBtn) {
                poOptsGenBtn.addEventListener("click", function() {
                    if (poActionMode === "agg") runPlotAgg();
                });
            }
            if (poOptsCancelBtn) {
                poOptsCancelBtn.addEventListener("click", function() {
                    poOptsPanel?.classList.remove("visible");
                });
            }

            actionBtns.agg?.addEventListener("click", function() { armAction("agg"); });

            // ── Group plots dropdown ─────────────────────────────────────────
            document.getElementById("po-group-plots-btn")?.addEventListener("click", function(e) {
                e.stopPropagation();
                const menu = document.getElementById("po-group-plots-menu");
                if (menu) menu.style.display = menu.style.display === "none" ? "" : "none";
            });
            document.addEventListener("click", function() {
                const menu = document.getElementById("po-group-plots-menu");
                if (menu) menu.style.display = "none";
            });

            document.getElementById("po-act-gvc")?.addEventListener("click", function() {
                const menu = document.getElementById("po-group-plots-menu");
                if (menu) menu.style.display = "none";
                startGvcWizard();
            });

            document.getElementById("po-act-gvg")?.addEventListener("click", function() {
                const menu = document.getElementById("po-group-plots-menu");
                if (menu) menu.style.display = "none";
                startGvgWizard();
            });

            // ── Multi-file plots functions ───────────────────────────────────
            function poMultiFileCancel() {
                const wizard = document.getElementById("po-multi-file-wizard");
                if (wizard) wizard.classList.remove("active");
            }

            function renderMultiFileWizard() {
                const btnsEl = document.getElementById("po-multi-file-btns");
                if (!btnsEl) return;
                btnsEl.innerHTML = `
                    <button type="button" id="po-multi-file-cancel" style="background:#64748b;">Cancel</button>
                `;
                document.getElementById("po-multi-file-cancel")?.addEventListener("click", poMultiFileCancel);
            }

            function startMultiFileWizard() {
                poGvcCancel();
                poGvgCancel();
                const wizard = document.getElementById("po-multi-file-wizard");
                if (wizard) wizard.classList.add("active");
                renderMultiFileWizard();
            }

            document.getElementById("po-multi-file-btn")?.addEventListener("click", function() {
                startMultiFileWizard();
            });
        }

        // Open plate overview modal
        if (openPoBtn) {
            openPoBtn.addEventListener("click", async function() {
                if (!poModal) return;
                // Reset all state
                poGroups = {};
                poFeatures = { "m0": {}, "seed conc": {} };
                poActiveFeature = "";
                poSelection = new Set();
                poDrawMode = false;
                poGvcStep = 0; poGvcControlWells.clear(); poGvcSelectedGroups = [];
                poTabs = [];
                poActiveTabIdx = -1;
                pickerVisible = false;
                if (poRunPicker) { poRunPicker.classList.remove("visible"); poRunPicker.innerHTML = ""; }
                if (poTabBar) { poTabBar.innerHTML = ""; }
                // Hide FAB on fresh open
                const fab = document.getElementById("po-fab-wrap");
                if (fab) fab.classList.remove("visible");
                // Show modal with loading state
                _halvingBannerDismissed = false;
                if (poContent) poContent.innerHTML = '<div class="po-loading">Loading plate data…</div>';
                poModal.classList.add("show");
                poModal.setAttribute("aria-hidden", "false");

                // Gather form data for current upload set
                const mainForm = openPoBtn.closest("form");
                const fd = new FormData(mainForm || document.createElement("form"));
                try {
                    const resp = await fetch("/plate_overview/data", { method: "POST", body: fd });
                    const data = await resp.json();
                    if (!resp.ok || !data.ok) {
                        if (poContent) poContent.innerHTML = `<div class="po-loading" style="color:#b91c1c;">Error: ${data.error || "Could not load plate data."}</div>`;
                        return;
                    }
                    // Figure out the label for the first tab
                    const currentRunId = fd.get("upload_set_id") || "";
                    const currentRun = PO_SAVED_RUNS.find(r => r.id === currentRunId);
                    const firstLabel = currentRun
                        ? (currentRun.run_name || currentRun.id.slice(0,8)).slice(0,30)
                        : (data.n_files ? `${data.n_files} file${data.n_files>1?"s":""}` : "Current");
                    poTabs = [{
                        label: firstLabel,
                        runId: currentRunId,
                        data: data,
                        groups: JSON.parse(JSON.stringify(data.groups || {})),
                        features: { "m0": {}, "seed conc": {} },
                        activeFeature: ""
                    }];
                    poActiveTabIdx = 0;
                    loadTabState(0);
                    renderTabBar();
                    renderPlateOvContent(poContent, data);
                } catch(err) {
                    if (poContent) poContent.innerHTML = `<div class="po-loading" style="color:#b91c1c;">Network error.</div>`;
                }
            });
        }

        // Close button
        function closePoModal() {
            if (poModal) {
                poModal.classList.remove("show");
                poModal.setAttribute("aria-hidden", "true");
            }
            // Hide FAB when modal closes
            const fab = document.getElementById("po-fab-wrap");
            if (fab) fab.classList.remove("visible");
        }
        if (closePoBtn) {
            closePoBtn.addEventListener("click", closePoModal);
        }
        // Dismiss halving banner
        const halvingBannerClose = document.getElementById("po-halving-banner-close");
        if (halvingBannerClose) {
            halvingBannerClose.addEventListener("click", function() {
                _halvingBannerDismissed = true;
                const banner = document.getElementById("po-halving-banner");
                if (banner) banner.classList.remove("show");
            });
        }
        if (poModal) {
            poModal.addEventListener("click", function(evt) {
                if (evt.target === poModal) closePoModal();
            });
        }

        // ── Sidebar: saved runs ───────────────────────────────────────────────
        const poSidebar = document.getElementById("po-sidebar");
        const poSidebarToggle = document.getElementById("po-sidebar-toggle");
        const poSidebarRunList = document.getElementById("po-sidebar-run-list");

        function renderSidebarRuns() {
            if (!poSidebarRunList) return;
            const activeRunId = poTabs[poActiveTabIdx]?.runId || "";
            if (!PO_SAVED_RUNS || PO_SAVED_RUNS.length === 0) {
                poSidebarRunList.innerHTML = '<div style="color:#94a3b8;font-size:0.78rem;padding:4px;">No saved files.</div>';
                return;
            }
            poSidebarRunList.innerHTML = "";
            PO_SAVED_RUNS.forEach(function(run) {
                const div = document.createElement("div");
                div.className = "po-sidebar-run" + (run.id === activeRunId ? " active" : "");
                const label = run.run_name || run.label || run.id.slice(0, 10);
                const date = run.created_at ? run.created_at.substring(0, 10) : "";
                const folder = run.folder_name ? `<span style="font-size:0.7rem;color:#94a3b8;margin-left:4px;">[${run.folder_name}]</span>` : "";
                div.innerHTML = `<div>${label}${folder}</div><div class="po-sidebar-run-date">${date}</div>`;
                div.addEventListener("click", function() {
                    loadRunIntoTab(run);
                    renderSidebarRuns();
                });
                poSidebarRunList.appendChild(div);
            });
        }

        if (poSidebarToggle && poSidebar) {
            poSidebarToggle.addEventListener("click", function() {
                const collapsed = poSidebar.classList.toggle("collapsed");
                poSidebarToggle.textContent = collapsed ? "◀" : "▶";
                if (!collapsed) renderSidebarRuns();
            });
        }

        // Re-render sidebar highlight when a tab is clicked
        if (poTabBar) {
            poTabBar.addEventListener("click", function() {
                if (poSidebar && !poSidebar.classList.contains("collapsed")) {
                    setTimeout(renderSidebarRuns, 50);
                }
            });
        }
    })();
    </script>
